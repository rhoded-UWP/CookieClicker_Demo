<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pioneer Clicker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    font-family: Arial, sans-serif;
    color: #000000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 60px;
  }

  .pete-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    margin-bottom: 24px;
  }

  .pete-btn img {
    width: 300px;
    max-width: 80vw;
    height: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  .text-line {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .upgrade-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    margin-top: 16px;
    visibility: hidden;
  }

  .upgrade-btn.show {
    visibility: visible;
  }

  .upgrade-btn img {
    width: 240px;
    max-width: 70vw;
    height: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
</style>
</head>

    <img id="peteImg" alt="Pete">

  <div class="text-line">PPC: <span id="ppc">1</span></div>
  <div class="text-line">Upgrade: <span id="cost">100</span></div>

  <button class="upgrade-btn" id="upgrade">

document.getElementById('peteImg').src = PETE_IMG;
document.getElementById('logoImg').src = LOGO_IMG;

let score = 0;
let ppc = 1;
let cost = 100;

const $score = document.getElementById('score');
const $ppc = document.getElementById('ppc');
const $cost = document.getElementById('cost');
const $upgrade = document.getElementById('upgrade');

function refresh() {
  $score.textContent = score;
  $ppc.textContent = ppc;
  $cost.textContent = cost;
  if (score >= cost) {
    $upgrade.classList.add('show');
  } else {
    $upgrade.classList.remove('show');
  }
}

document.getElementById('pete').addEventListener('click', () => {
  score += ppc;
  refresh();
});

$upgrade.addEventListener('click', () => {
  if (score >= cost) {
    score -= cost;
    ppc += 1;
    cost = Math.floor(cost * 1.5);
    refresh();
  }
});

refresh();
</script>
